
<div class="container">
    <div class="modal fade" role="dialog" tabindex="-1" id="passwordPrompt" style="color: rgb(33, 37, 41);"
        display="none">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header" style="background: rgb(33,37,41);color: rgb(33, 37, 41);">
                    <h4 class="modal-title" style="color: var(--bs-modal-bg);">Create a Password</h4><button
                        class="btn-close btn-close-white" id="closePasswordModal" type="button" aria-label="Close"
                        data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="background: rgb(33,37,41);">
                    <p style="font-size: 12px;color: var(--bs-modal-bg);">The password is used to encrypt the files
                        before it leaves your browser.</p>
                    <form id="passwordForm"><label class="form-label"
                            style="color: rgb(255,255,255);font-size: 12px;">Password requirements: 8
                            characters</label><input class="form-control" type="password" id="passwordInput"
                            required=""></form>
                    <p id="passwordInvalidTxt" style="font-size: 11px;color: var(--bs-yellow);display: none;">Password
                        must be at least 8 characters long.</p>
                </div>
                <div class="modal-footer" style="background: rgb(33,37,41);"><button class="btn btn-light"
                        id="closePasswordBtn" type="button" data-bs-dismiss="modal">Close</button><button
                        class="btn btn-primary" id="savePasswordBtn" type="button">Save</button></div>
            </div>
        </div>
    </div>
</div>
